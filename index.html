<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lily hay Jihyo?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-card">
    <h1>Bạn thích ai hơn?</h1>
    <p class="hint">Chọn một trong hai nhé~</p>
    <div class="choices" id="choices">
      <button class="choice-btn lily-btn" id="lilyBtn">💗 Lily</button>
      <button class="choice-btn jihyo-btn" id="jihyoBtn">🌸 Jihyo</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <p class="modal-text">tôi cũng thích Lily 💕</p>
      <button class="reset-btn" id="resetBtn">Quay lại</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
